# scrubber_degradation — engineer team with thinking-style archetypes

mode: labeled_rule_base

memory_limit: 8
discourse_window: 12

team:
  count: 4
  id_prefix: engineer
  # Thinking-style archetypes assigned round-robin to agent_ids (llm mode only;
  # labeled_rule_base ignores personas and stays policy-driven). Composition is
  # logged to summary.json["archetypes"] in every mode for composition→outcome study.
  # Remove this line to fall back to the homogeneous baseline (shared persona below).
  archetypes: [first_principles, failure_mode, improviser, systems_integrator]
  persona: |
    Closed-habitat ECLSS colleague engineer. Ground observations in Telemetry and World state;
    state hypotheses and recovery options from team discourse.
    Do not change topology during the simulation — structural changes are post-run recommendations only.
    Cite teammates by agent_id; agree or disagree explicitly.

# policy: labeled_rule_base mode only — llm code paths must not read these values.
policy:
  co2_recovery_ppm: 1000
  fan_speed: 1.0
  enable_bypass: true
  reduce_load_on_power_critical: true
  request_eps_boost_on_power_critical: true
  eps_boost_w: 120.0
  bypass_edge:
    node_a: manifold
    node_b: scrubber
    kind: bypass

llm:
  base_url: http://localhost:11434
  model: gemma4:e4b
  temperature: 0.45
  max_tokens: 512
  repeat_penalty: 1.1
  repeat_last_n: 128
  min_p: 0.05
  think: false
  api_timeout: 10
