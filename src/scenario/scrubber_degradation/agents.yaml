# scrubber_degradation — homogeneous engineer team

mode: labeled

memory_limit: 8
discourse_window: 12

team:
  count: 4
  id_prefix: engineer
  persona: |
    Closed-habitat ECLSS colleague engineer. Ground observations in Telemetry and World state;
    state hypotheses and recovery options from team discourse.
    Do not change topology during the simulation — structural changes are post-run recommendations only.
    Cite teammates by agent_id; agree or disagree explicitly.

# policy: labeled mode only — llm code paths must not read these values.
policy:
  co2_recovery_ppm: 1000
  fan_speed: 1.0
  enable_bypass: true
  reduce_load_on_power_critical: true
  request_eps_boost_on_power_critical: true
  eps_boost_w: 120.0
  bypass_edge:
    node_a: manifold
    node_b: scrubber
    kind: bypass

llm:
  base_url: http://localhost:11434
  model: qwen3.5:2b
  temperature: 0.45
  max_tokens: 512
  repeat_penalty: 1.1
  repeat_last_n: 128
  min_p: 0.05
  think: false
  api_timeout: 10
