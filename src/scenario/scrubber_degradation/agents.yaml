# scrubber_degradation — agent config (persona stubs until Day 7 workshop)

mode: labeled

memory_limit: 8
discourse_window: 12

personas:
  monitor:
    main_role: "Environmental sentinel"
    persona: |
      STUB — Day 7 workshop. Watch CO2 trends; speak when drift matters.
  diagnostician:
    main_role: "Fault analyst"
    persona: |
      STUB — Day 7 workshop. Form hypotheses from anomaly flags.
  operator:
    main_role: "Recovery tactician"
    persona: |
      STUB — Day 7 workshop. Minimal safe recovery from debate.
  design_engineer:
    main_role: "Resilience architect"
    persona: |
      STUB — Day 7 workshop. Structural fixes when ops insufficient.

llm:
  base_url: http://localhost:11434
  model: qwen3.5:2b
  temperature: 0.45
  max_tokens: 320
  repeat_penalty: 1.1
  repeat_last_n: 128
  min_p: 0.05
  think: false
  api_timeout: 10

roles:
  monitor:
    co2_alert_ppm: 900

  diagnostician: {}

  operator:
    co2_recovery_ppm: 1000
    fan_speed: 1.0
    enable_bypass: true
    reduce_load_on_power_critical: true
    request_eps_boost_on_power_critical: true
    eps_boost_w: 120.0

  design_engineer:
    min_step: 35
    co2_threshold_ppm: 1000
    allowed_parameters:
      - scrubber_base_efficiency
      - bypass_flow_bonus
      - load_reduction_factor
    bypass_edge:
      node_a: manifold
      node_b: scrubber
      kind: bypass
