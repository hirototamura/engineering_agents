name: scrubber_degradation
description: >
  Baseline ECLSS demo. Scrubber efficiency degrades at step 20; CO2 rises into
  the warning/critical band. No agents (deterministic physics-only run).

simulation:
  steps: 50
  initial_co2_ppm: 800.0
  initial_power_margin_w: 150.0

design_parameters:
  scrubber_base_efficiency: 0.95
  co2_production_ppm_per_step: 32.0
  scrub_rate_coefficient: 0.06
  fan_power_w: 80.0
  bypass_power_w: 40.0
  bypass_flow_bonus: 0.15
  permanent_bypass_power_w: 20.0
  load_reduction_factor: 0.6
  base_power_draw_w: 200.0

anomalies:
  - name: scrubber_degradation
    start_step: 20
    scrubber_efficiency_decay_per_step: 0.02
    power_margin_decay_per_step: 3.0
    co2_production_multiplier: 1.4

agents:
  mode: none  # none | labeled_rule_base | llm

output:
  run_id: scrubber_degradation_baseline
  run_id_labeled_rule_base: scrubber_degradation_labeled_rule_base
  run_id_llm: scrubber_degradation_llm
