name: SSOS E2E Regression

on:
  workflow_dispatch:
    inputs:
      with_eps:
        description: Include EPS smoke (ssos-headless.sh)
        type: boolean
        default: false
      with_llm:
        description: Include ea-loop llm mode (needs Ollama on host)
        type: boolean
        default: false
      use_existing:
        description: Use existing SSOS container instead of creating one
        type: boolean
        default: false
  schedule:
    - cron: "0 3 * * 1"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: python3 -m pytest -q

  ssos-e2e:
    needs: pytest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: [self-hosted, ssos]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Run SSOS container regression
        env:
          SSOS_E2E: "1"
          SSOS_E2E_WITH_EPS: ${{ github.event.inputs.with_eps == 'true' && '1' || '0' }}
          SSOS_E2E_WITH_LLM: ${{ github.event.inputs.with_llm == 'true' && '1' || '0' }}
          SSOS_USE_EXISTING: ${{ github.event.inputs.use_existing == 'true' && '1' || '0' }}
        run: |
          chmod +x scripts/run_ssos_regression.sh scripts/lib/ssos_docker.sh
          args=(--skip-pytest)
          if [[ "${{ github.event.inputs.with_eps }}" == "true" ]]; then
            args+=(--with-eps)
          fi
          if [[ "${{ github.event.inputs.with_llm }}" == "true" ]]; then
            args+=(--with-llm)
          fi
          if [[ "${{ github.event.inputs.use_existing }}" == "true" ]]; then
            args+=(--use-existing)
          fi
          ./scripts/run_ssos_regression.sh "${args[@]}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ssos-regression-reports
          path: artifacts/ssos-regression/
          if-no-files-found: ignore
